<!DOCTYPE html>
<html>
<head>
    <title>Ürünler</title>
</head>
<body>

<h1>Ürünler</h1>

<div id="list"></div>

<script>
fetch("http://localhost:5054/api/Products")
.then(res => res.json())
.then(data => {

    let html = "";

    data.forEach(x => {
        html += `
            <div style="border:1px solid black; padding:10px; margin:10px;">
                <h2>${x.name}</h2>
                <img src="${x.imageUrl}" width="150"><br>
                <b>${x.price} TL</b><br><br>
                <a href="http://localhost:5054/api/Products/order/${x.id}" target="_blank">
                    Sipariş Ver
                </a>
            </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
});
</script>

</body>
</html>
